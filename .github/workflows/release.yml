name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── macOS ARM (Apple Silicon) ─────────────────────────────────
  build-macos-arm:
    name: macOS ARM
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install wxWidgets
        run: brew install wxwidgets

      - name: Configure
        run: cmake -S . -B build -DBUILD_GUI=ON -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --target IntegrationCalculatorGUI --config Release

      - name: Package
        run: |
          cd build
          zip -r "../Integration-Calculator-macOS-arm64.zip" "Integration Calculator.app"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: Integration-Calculator-macOS-arm64.zip

  # ── macOS x86_64 ──────────────────────────────────────────────
  build-macos-x86:
    name: macOS x86_64
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4

      - name: Install wxWidgets
        run: brew install wxwidgets

      - name: Configure
        run: cmake -S . -B build -DBUILD_GUI=ON -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --target IntegrationCalculatorGUI --config Release

      - name: Package
        run: |
          cd build
          zip -r "../Integration-Calculator-macOS-x86_64.zip" "Integration Calculator.app"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-x86_64
          path: Integration-Calculator-macOS-x86_64.zip

  # ── Linux x86_64 ──────────────────────────────────────────────
  build-linux-x86:
    name: Linux x86_64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ libwxgtk3.2-dev

      - name: Configure
        run: cmake -S . -B build -DBUILD_GUI=ON -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --target IntegrationCalculatorGUI --config Release

      - name: Package
        run: |
          cp build/IntegrationCalculatorGUI Integration-Calculator-Linux-x86_64
          chmod +x Integration-Calculator-Linux-x86_64
          tar -czf Integration-Calculator-Linux-x86_64.tar.gz Integration-Calculator-Linux-x86_64

      - uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64
          path: Integration-Calculator-Linux-x86_64.tar.gz

  # ── Linux ARM64 ───────────────────────────────────────────────
  build-linux-arm:
    name: Linux ARM64
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ libwxgtk3.2-dev

      - name: Configure
        run: cmake -S . -B build -DBUILD_GUI=ON -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --target IntegrationCalculatorGUI --config Release

      - name: Package
        run: |
          cp build/IntegrationCalculatorGUI Integration-Calculator-Linux-arm64
          chmod +x Integration-Calculator-Linux-arm64
          tar -czf Integration-Calculator-Linux-arm64.tar.gz Integration-Calculator-Linux-arm64

      - uses: actions/upload-artifact@v4
        with:
          name: linux-arm64
          path: Integration-Calculator-Linux-arm64.tar.gz

  # ── Windows x86_64 ────────────────────────────────────────────
  build-windows:
    name: Windows x86_64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install wxWidgets via vcpkg
        run: |
          vcpkg install wxwidgets:x64-windows
          echo "CMAKE_TOOLCHAIN_FILE=$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" >> $env:GITHUB_ENV

      - name: Configure
        run: cmake -S . -B build -DBUILD_GUI=ON -DCMAKE_BUILD_TYPE=Release -DCMAKE_TOOLCHAIN_FILE="$env:CMAKE_TOOLCHAIN_FILE" -DVCPKG_TARGET_TRIPLET=x64-windows

      - name: Build
        run: cmake --build build --target IntegrationCalculatorGUI --config Release

      - name: Package
        run: |
          copy build\Release\IntegrationCalculatorGUI.exe Integration-Calculator-Windows-x86_64.exe
          Compress-Archive -Path Integration-Calculator-Windows-x86_64.exe -DestinationPath Integration-Calculator-Windows-x86_64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: windows-x86_64
          path: Integration-Calculator-Windows-x86_64.zip

  # ── Create GitHub Release ─────────────────────────────────────
  release:
    name: Publish Release
    needs:
      - build-macos-arm
      - build-macos-x86
      - build-linux-x86
      - build-linux-arm
      - build-windows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: artifacts

      - name: Extract changelog for this version
        id: changelog
        run: |
          TAG="${GITHUB_REF_NAME}"
          # Extract the block between this tag's heading and the next ## heading
          NOTES=$(awk "/^## \[${TAG}\]/{found=1; next} found && /^## /{exit} found{print}" CHANGELOG.md)
          # Pass multiline output to the next step
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          body: ${{ steps.changelog.outputs.notes }}
